<form id="reportFilterForm" class="report-filter" novalidate>
  <div class="report-filter__row">
    <span class="report-field__label">ประเภทรายงาน</span>
    <div class="report-radio-group">
      <label><input type="radio" name="reportBy" value="agent" checked> แยกตามตัวแทน</label>
      <label><input type="radio" name="reportBy" value="car"> แยกตามรหัสรถ</label>
    </div>
  </div>
  <div class="report-filter__row">
    <label class="report-field__label" for="policyType">ประเภทกรมธรรม์</label>
    <select id="policyType" name="policyType">
      <option value="">ทุกประเภท</option>
      <option value="compulsory">พ.ร.บ.</option>
      <option value="voluntary">ภาคสมัครใจ</option>
    </select>
  </div>
  <div class="report-filter__row">
    <span class="report-field__label">ค้นหาจาก</span>
    <div class="report-date-range">
      <select id="dateField" name="dateField">
        <option value="txn">ค้นหาจาก : วันที่ทำ</option>
        <option value="coverage">วันที่คุ้มครอง</option>
      </select>
      <input type="date" id="dateFrom" name="dateFrom">
      <span class="report-date-range__sep">ถึง</span>
      <input type="date" id="dateTo" name="dateTo">
    </div>
  </div>
  <div class="report-filter__row">
    <label class="report-field__label" for="insurer">บริษัทประกันภัย</label>
    <select id="insurer" name="insurer">
      <option value="">ทุกบริษัท</option>
      <option value="indara">อินทรประกันภัย</option>
      <option value="viriyah">วิริยะประกันภัย</option>
      <option value="tokio">โตเกียวมารีนประกันภัย</option>
      <option value="ergo">เออร์โกประกันภัย</option>
    </select>
  </div>
  <div class="report-filter__row">
    <label class="report-field__label" for="agentCode">รหัสตัวแทน</label>
    <input type="text" id="agentCode" name="agentCode" placeholder="">
  </div>
  <div class="report-filter__actions">
    <div class="report-filter__actions-main">
      <button type="button" class="btn-secondary" id="btnReportCancel">Cancel</button>
      <button type="submit" class="btn-primary" id="btnReportSubmit">Submit</button>
    </div>
    <div class="report-filter__actions-export">
      <button type="button" class="btn-danger btn-sm" id="btnReportPdf">View to PDF</button>
      <button type="button" class="btn-primary btn-sm" id="btnReportExcel">Export to Excel</button>
    </div>
  </div>
</form>
